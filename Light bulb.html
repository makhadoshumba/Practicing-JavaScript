<!doctype html>
<html lang="en">
  <head>
    <title>JavaScript</title>
  </head>
  <style>
    h1 {
      text-align: center;
    }

    .lightbulb {
      justify-content: center;
      align-content: center;
      display: flex;
      height: auto;
    }

    .switches {
      justify-content: center;
      align-content: center;
      display: flex;
      gap: 10px;
    }

    button {
      background-color: rgb(0, 0, 0);
      color: rgb(255, 255, 255);
      height: 40px;
      width: 90px;
      font-weight: 30px;
      border-radius: 10px;
      border-color: black;
    }
    .box {
      display: flex;
      align-content: center;
      flex-direction: column;
      height: auto;
    }
  </style>

  <body>
    <h1>Practicing JavaScript</h1>

    <div class="box">
      <div class="lightbulb">
        <img
          id="img"
          alt="lightbulb"
          style="width: 400px; height: 400px"
          src="lightoff.jpg"
        />
      </div>
      <div class="switches">
        <button alt="Switch on the lightbulb" type="button" onclick="lighton()">
          Switch On
        </button>
        <button
          alt="Switch off the lightbulb"
          type="button"
          onclick="lightoff()"
        >
          Switch Off
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
